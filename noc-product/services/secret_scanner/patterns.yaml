# OF-5.7 / E6a §2.4 — secret-pattern register.
# Seeded from gitleaks default rules + detect-secrets defaults.
# Pinned copy; false-positive calibration tracked in OF-6.15.

patterns:
  - id: aws-access-key-id
    severity: high
    description: AWS access key id
    regex: '\bAKIA[0-9A-Z]{16}\b'
  - id: aws-secret-access-key
    severity: high
    description: AWS secret access key
    regex: '(?i)aws(.{0,20})?(?:secret|access)[_-]?key[^\n]{0,40}[=:]\s*[''"]?[A-Za-z0-9/+=]{40}[''"]?'
  - id: private-key-pem
    severity: high
    description: PEM-encoded private key
    regex: '-----BEGIN (RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----'
  - id: jwt
    severity: medium
    description: JSON Web Token
    regex: '\beyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]{8,}\b'
  - id: github-token
    severity: high
    description: GitHub PAT / fine-grained token
    regex: '\b(ghp|gho|ghu|ghs|ghr|github_pat)_[A-Za-z0-9_]{20,}\b'
  - id: slack-token
    severity: high
    description: Slack token
    regex: '\bxox[abpsr]-[A-Za-z0-9-]{10,}\b'
  - id: generic-api-key
    severity: medium
    description: Generic "api_key=..." string
    regex: '(?i)\b(api[_-]?key|apikey|x-api-key)\s*[=:]\s*[''"]?[A-Za-z0-9_\-]{16,}[''"]?'
  - id: password-assignment
    severity: low
    description: Inline password assignment
    regex: '(?i)\bpassword\s*[=:]\s*[''"][^''"\n]{6,}[''"]'
  - id: db-url-with-creds
    severity: high
    description: DB URL with embedded credentials
    regex: '(?i)(postgres(?:ql)?|mysql|mongodb|redis)://[^:\s]+:[^@\s]+@[^\s]+'
