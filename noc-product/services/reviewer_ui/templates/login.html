{% extends "base.html" %}
{% block title %}Sign in · NOC Reviewer{% endblock %}
{% block content %}
<div class="card" style="max-width:480px; margin:4rem auto;">
  <h2>Sign in</h2>
  <p class="muted">Operator authentication via mock SSO (Dex).</p>
  <p><a class="actions" href="/login/start"><button class="primary">Continue with SSO</button></a></p>
  <p class="hint">Dev note: Dex ships with seeded users for local testing.</p>
  {% if error %}<div class="flash err">{{ error }}</div>{% endif %}
</div>
{% endblock %}
