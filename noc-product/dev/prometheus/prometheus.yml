global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: chain-write
    static_configs:
      - targets: ["chain-write:7001"]
  - job_name: agents
    static_configs:
      - targets: ["agents:7002"]
  - job_name: reviewer-ui
    static_configs:
      - targets: ["reviewer-ui:8080"]
  - job_name: identity-audit-api
    static_configs:
      - targets: ["identity-audit-api:7005"]
  - job_name: mock-ctts
    static_configs:
      - targets: ["mock-ctts:8001"]
  - job_name: intake
    static_configs:
      - targets: ["intake:9464"]
  - job_name: write-back
    static_configs:
      - targets: ["write-back:9465"]
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
